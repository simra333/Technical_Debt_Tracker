<!DOCTYPE html>
<html>
    <head>
        <title>Add a new Technical Debt Item</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>
    <body>
        <h1>Add Technical Debt</h1>
        <button type="button" onclick="window.location.href='/'">Back to Main Page</button>

        <form id="add-debt-item">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required>

            <br><br>

            <label for="description">Description</label>
            <input type="text" id="description" name="description" required>

            <br><br>

            {% if use_category_dropdown %}
            <label for="category">Category</label>
            <select id="category" name="Category" required>
                <option value="Architectural Debt">Architectural Debt</option>
                <option value="Implementation Debt">Implementation Debt</option>
                <option value="Documentation Debt">Documentation Debt</option>
                <option value="Other">Other</option>
            </select>
            {% else %}
            <!-- flag OFF: keep old behaviour -->
            <label for="category_text">Category</label>
            <input type="text" id="category_text" name="Category" required>
            {% endif %}

            <br><br>

            <label for="risk">Risk</label>
            <input
                type="number"
                id="risk"
                name="risk"
                min="1"
                max="5"
                step="1"
                placeholder="Enter a value between 1 (low risk) and 5 (high risk)"
                required
            >

            <br><br>

            <label for="effort_estimate">Effort Estimate (hours)</label>
            <input 
            type="number" 
            id="effort_estimate" 
            name="effort_estimate" 
            min="1"
            step="1"
            placeholder="Enter a value greater than 0"
            required
            >

            <br><br>

            <label for="status">Status</label>
            <select id="status" name="status" required>
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Resolved">Resolved</option>
            </select>

            <br><br>

            <label for="assigned_to">Assigned To (Optional)</label>
            <input type="text" id="assigned_to" name="assigned_to">

            <br><br>

            <button type="submit">Add Debt Item</button>
        </form>

        <script src="/static/add.js"></script>
    </body>
</html>
