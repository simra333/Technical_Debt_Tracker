<!DOCTYPE html>
<html>
    <head>
        <title>Edit Technical Debt Item</title>
    </head>
    <body>
        <h1>Edit Technical Debt Item</h1>
        <a href="/">Back to Main Page</a>

        <form id = "edit-form">
            <input type="hidden" id="debt-id" value="{{debt_id}}">

            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{debt_item.title}}" required>
            <br><br>

            <label for="description">Description</label>
            <textarea id="description" name="description" required>{{debt_item.description}}</textarea>
            <br><br>

            <label for ="risk">Risk</label>
            <input type="number" id="risk" name="risk" value="{{debt_item.risk}}" required>
            <br><br>

            <label for="effort_estimate">Effort Estimate (hours)</label>
            <input type="number" id="effort_estimate" name="effort_estimate" value="{{debt_item.effort_estimate}}" required>
            <br><br>

            <button type="submit">Save Changes</button>
        </form>

        # Include JavaScript to handle form submission

    </body>
</html>
