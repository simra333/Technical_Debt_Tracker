<!DOCTYPE html>
<html>
    <head>
        <title>Edit Technical Debt Item</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>
    <body>
        <h1>Edit Technical Debt Item</h1>
        <button type="button" onclick="window.location.href='/'">Back to Main Page</button>

        <form id = "edit-form">
            <input type="hidden" id="debt-id" value="{{debt_id}}">

            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{debt_item.title}}" required>
            <br><br>

            <label for="description">Description</label>
            <textarea id="description" name="description" required>{{debt_item.description}}</textarea>
            <br><br>

            {% if use_category_dropdown %}
            <label for="category">Category</label>
            <select id="category" name="category" required>
                <option value="Architectural Debt" {% if debt_item.category == 'Architectural Debt' %}selected{% endif %}>Architectural Debt</option>
                <option value="Implementation Debt" {% if debt_item.category == 'Implementation Debt' %}selected{% endif %}>Implementation Debt</option>
                <option value="Documentation Debt" {% if debt_item.category == 'Documentation Debt' %}selected{% endif %}>Documentation Debt</option>
                <option value="Other" {% if debt_item.category == 'Other' %}selected{% endif %}>Other</option>
            </select>
            {% else %}
            <!-- flag OFF: keep old behaviour -->
            <label for="category_text">Category</label>
            <input type="text" id="category_text" name="category" required>
            {% endif %}

            <br><br>

            <label for="risk">Risk</label>
            <input
                type="number"
                id="risk"
                name="risk"
                value="debt_item.risk"
                min="1"
                max="5"
                step="1"
                placeholder="Enter a value between 1 and 5"
                required
            >

            <br><br>

            <label for="effort_estimate">Effort Estimate (hours)</label>
            <input type="number" 
            id="effort_estimate" 
            name="effort_estimate" 
            value="{{debt_item.effort_estimate}}" 
            min="1"
            step="1"
            placeholder="Enter a value greater than 0"
            required
            >

            <br><br>

            <label for="status">Status</label>
            <select id="status" name="status" required>
                <option value="Open" {% if debt_item.status == 'Open' %}selected{% endif %}>Open</option>
                <option value="In Progress" {% if debt_item.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                <option value="Resolved" {% if debt_item.status == 'Resolved' %}selected{% endif %}>Resolved</option>
            </select>
            <br><br>

            <label for="assigned_to">Assigned To (Optional)</label>
            <input type="text" id="assigned_to" name="assigned_to" value="{{debt_item.assigned_to}}">
            <br><br>

            <button type="submit">Save Changes</button>
        </form>

        <script src="/static/edit.js"></script>

    </body>
</html>
