<!DOCTYPE html>
<html>
<head>
    <title>Technical Debt Tracker</title>
    <link rel="stylesheet" type="text/css" href="/static/style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <img src="/static/images/logo.png" alt="Technical Debt Tracker Logo" class="sidebar-logo">
            
            <h2>Technical Debt Tracker</h2>

            <nav>
                <button type="button" onclick="window.location.href='/'">Dashboard</button>
                <button type="button" onclick="window.location.href='/add'">Add New Item</button>
            </nav>

            <form action="/logout" method="POST">
                <button type="submit" class="logout-button">Logout</button>
            </form>
        </aside>

        <main class="main-content">
            <h1>View all entries</h1>

            <ul id="debt-list">
                <!-- JavaScript to fetch and display technical debt items here -->
            </ul>
        </main>
    </div>

    <script src="/static/index.js"></script>
</body>
</html>
